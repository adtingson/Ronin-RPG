<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Ronin</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles/style.css">
        <link rel="stylesheet" href="styles/JetBrains Mono.css">
        <link rel="stylesheet" href="styles/Blobmoji.css">
    </head>
    <header>
        <h1>Ronin</h1>
    </header>
    <body>
        <div id="game">
            <aside id="ronin">
                <section>
                    <h3>The Ronin</h3>
                    <ul id="stats"></ul>
                </section>
                <section>
                    <h3>Allies</h3>
                    <div id="allies"></div>
                </section>
                <section>
                    <h3>Possible Allies</h3>
                    <div id="possibleallies"></div>
                </section>
            </aside>
            <main id="encounter">
                <h2 id="encounterHeader"></h2>

                <p id="encounterText"></p>

                <div id="combatHeader" style="text-align: center;"></div>

                <div id="interactText" style="text-align: center;"></div>

                <p style="text-align: center;" id="encounterButtons"></p>
            </main>
            <aside id="queues">
                <section>
                    <h3>Current Enemies</h3>
                    <div id="enemyqueue"></div>
                </section>
                <section>
                    <h3>Living Enemies</h3>
                    <div id="enemies"></div>
                </section>
                <section>
                    <h3>End of the Route Enemies</h3>
                    <div id="endrouteenemies"></div>
                </section>
                <section>
                    <h3>Villains</h3>
                    <div id="villains"></div>
                </section>
            </aside>
        </div>


        
        <script src="script/clans.js" defer></script>
        <script src="script/family.js" defer></script>
        <script src="script/name.js" defer></script>
        <script src="script/appearance.js" defer></script>
        <script src="script/technique.js" defer></script>
        <script src="script/villain.js" defer></script>
        <script src="script/nightmares.js" defer></script>
        <script src="script/scar.js" defer></script>
        <script src="script/character sheet.js" defer></script>
        <script src="script/rooms.js" defer></script>
        <script src="script/encounters.js" defer></script>
        <script src="script/fight.js" defer></script>
        <script src="script/talk.js" defer></script>
        <script src="script/intimidate.js" defer></script>
        <script src="script/charm.js" defer></script>
    </body>
</html>
